name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_smoke_hooks:
        description: Run optional smoke-test hook job placeholders
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore
      - name: Format check
        run: dotnet format --verify-no-changes
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Test
        run: dotnet test -c Release --no-build
      - name: NuGet vulnerability check
        run: dotnet list package --vulnerable --include-transitive
      - name: Validate deployment JSON
        run: python -m json.tool deploy/ecs-task-definition.example.json >/dev/null && python -m json.tool deploy/iam-task-policy.example.json >/dev/null
      - name: Docker build validation
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            docker build -t jarvis-ai-gateway:ci .
          else
            echo "Docker is unavailable on this runner; skipping container build validation."
          fi

  smoke-hooks:
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke_hooks == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Manual smoke-test hook placeholder
        run: |
          echo "Add environment-specific smoke tests here. This job intentionally requires workflow_dispatch and does not require AWS credentials by default."
